# Skills CLI manifest — https://github.com/antfu/skills-cli
# 安装: npx skills add Veblin/invest-skills
# 列出: npx skills add Veblin/invest-skills --list
# 单装: npx skills add Veblin/invest-skills --skill invest-a-stock

agents: [claude-code]

skills:
  - name: invest-a-stock
    description: A股多因子交叉验证的结构化投研助手 — 数据采集 + 学术级引用，产出带来源追溯的 Markdown 研究备忘录。研究工具，非决策工具。
    repo: Veblin/invest-skills
    skill: invest-a-stock

  - name: invest-a-limit-up
    description: A股涨停板全市场扫描 + 交互式深挖 — 盘面宽度 / 板块轮动 / 涨停归因，支持质量过滤与交互筛选。研究工具，非决策工具。
    repo: Veblin/invest-skills
    skill: invest-a-limit-up

  - name: invest-a-gap-scan
    description: A股跳空缺口扫描 — 向上缺口 + MA60 上方 + 未回补，指数成分股池（沪深300+中证A500+科创50）。研究工具，非决策工具。
    repo: Veblin/invest-skills
    skill: invest-a-gap-scan

  - name: invest-a-journal
    description: 交易日志 v2 — Claude 驱动四维评估（逻辑/盲点/仓位匹配/风险收益）+ 数据引擎；ETF 路径调用 invest-a-etf 共用模块。研究工具，非决策工具。
    repo: Veblin/invest-skills
    skill: invest-a-journal

  - name: invest-a-etf
    description: A股 ETF 结构化研究 — 指数估值/折溢价/AUM/跟踪质量/对冲覆盖，产出带来源追溯的研究备忘录。研究工具，非决策工具。
    repo: Veblin/invest-skills
    skill: invest-a-etf
