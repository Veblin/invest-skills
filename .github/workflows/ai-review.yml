name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      (secrets.DEEPSEEK_API_KEY != '' || secrets.GEMINI_API_KEY != '' ||
       secrets.OPENAI_API_KEY != '' || secrets.ANTHROPIC_API_KEY != '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR diff
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > pr.diff
          echo "Diff size: $(wc -c < pr.diff) bytes, $(wc -l < pr.diff) lines"

      - name: AI review
        env:
          # Provider: deepseek (default) | gemini | openai | openrouter | anthropic
          # vars.* unset in GitHub expands to ''; use || so CI never passes empty provider.
          AI_REVIEW_PROVIDER: ${{ vars.AI_REVIEW_PROVIDER || 'deepseek' }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL }}
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: python3 .github/scripts/ai_pr_review.py

      - name: Post PR review
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body, verdict;
            try {
              body = fs.readFileSync('review.md', 'utf8');
              verdict = fs.readFileSync('review_verdict.txt', 'utf8').trim();
            } catch {
              body = '## 🤖 AI Code Review\n\n_Review step failed before generating output._';
              verdict = 'COMMENT';
            }
            const event = ['APPROVE', 'REQUEST_CHANGES', 'COMMENT'].includes(verdict)
              ? verdict
              : 'COMMENT';

            const pullNumber = context.payload.pull_request?.number;
            if (!pullNumber) {
              core.setFailed('Missing pull_request.number in workflow context');
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              event,
              body,
            });
