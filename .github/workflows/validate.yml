name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Preflight checks (diagnose + version consistency)
        run: |
          uv run python skills/invest-a-stock/scripts/invest.py diagnose --json
          uv run python scripts/sync_version.py check

      - name: Run test suite
        run: uv run pytest

      - name: Verify release notes extractor
        run: uv run pytest .github/scripts/test_extract_release_notes.py -q

      - name: Security scan (secrets leak check)
        run: |
          echo "Scanning for leaked secrets..."
          ! grep -rE "(TUSHARE_TOKEN|FRED_API_KEY|TAVILY_API_KEY|BOCHA_API_KEY)=[A-Za-z0-9_\-]{4,}" . \
            --include="*.py" --include="*.md" --include="*.yaml" --include="*.json" \
            --exclude-dir=.venv --exclude-dir=.git --exclude=.env.example 2>/dev/null
