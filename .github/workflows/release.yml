name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release archive
        run: |
          mkdir -p dist/pkg
          cp -r \
            .claude-plugin \
            .agents \
            hooks \
            skills/invest-A \
            gemini-extension.json \
            pyproject.toml \
            README.md \
            AGENTS.md \
            CONFIGURATION.md \
            CHANGELOG.md \
            CONTRIBUTORS.md \
            CODE_OF_CONDUCT.md \
            SECURITY.md \
            .env.example \
            LICENSE \
            dist/pkg/
          # Clean build artifacts from copy
          rm -rf dist/pkg/skills/invest-A/__pycache__ dist/pkg/.venv
          find dist/pkg \( -name '*.pyc' -o -name '*.pyo' -o -name '.DS_Store' \) -delete
          cd dist && tar -czf invest-A-${{ github.ref_name }}.tar.gz -C pkg .
          rm -rf dist/pkg
          echo "Archive created: dist/invest-A-${{ github.ref_name }}.tar.gz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/invest-A-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
