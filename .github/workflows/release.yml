name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release archive
        run: |
          mkdir -p dist
          tar -czf dist/invest-A-${{ github.ref_name }}.tar.gz \
            skills/invest-A/ \
            .claude-plugin/ \
            .agents/ \
            hooks/ \
            gemini-extension.json \
            pyproject.toml \
            README.md \
            AGENTS.md \
            CONFIGURATION.md \
            CHANGELOG.md \
            CONTRIBUTORS.md \
            .env.example \
            LICENSE \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='.venv' \
            --exclude='.DS_Store'
          echo "Archive created: dist/invest-A-${{ github.ref_name }}.tar.gz"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/invest-A-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
