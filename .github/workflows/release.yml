name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release archive
        run: |
          mkdir -p dist/pkg
          cp -r \
            .claude-plugin \
            .agents \
            hooks \
            skills/lib \
            skills/invest-a-stock \
            skills/invest-a-limit-up \
            skills/invest-a-gap-scan \
            skills/invest-a-journal \
            skills/invest-a-etf \
            skills.yaml \
            gemini-extension.json \
            pyproject.toml \
            README.md \
            AGENTS.md \
            CONFIGURATION.md \
            CHANGELOG.md \
            CONTRIBUTORS.md \
            CODE_OF_CONDUCT.md \
            SECURITY.md \
            .env.example \
            LICENSE \
            dist/pkg/
          # Clean build artifacts from copy (cp -r skills/X → dist/pkg/X)
          rm -rf \
            dist/pkg/lib/__pycache__ \
            dist/pkg/invest-a-stock/__pycache__ \
            dist/pkg/invest-a-limit-up/__pycache__ \
            dist/pkg/invest-a-gap-scan/__pycache__ \
            dist/pkg/invest-a-journal/__pycache__ \
            dist/pkg/invest-a-etf/__pycache__ \
            dist/pkg/.venv
          find dist/pkg \( -name '*.pyc' -o -name '*.pyo' -o -name '.DS_Store' \) -delete
          cd dist && tar -czf invest-skills-${{ github.ref_name }}.tar.gz -C pkg .
          rm -rf dist/pkg
          echo "Archive created: dist/invest-skills-${{ github.ref_name }}.tar.gz"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python3 .github/scripts/extract_release_notes.py "${{ github.ref_name }}" > release-notes.md
          echo "-----"
          head -20 release-notes.md
          echo "-----"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/invest-skills-${{ github.ref_name }}.tar.gz
          body_path: release-notes.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: true
