name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 8 * * 1" # 每周一 UTC 8:00

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for leaked secrets
        run: |
          echo "Scanning for common secret patterns..."
          ! grep -rE "(TUSHARE_TOKEN|FRED_API_KEY|TAVILY_API_KEY|BOCHA_API_KEY)=[A-Za-z0-9_\-]{4,}" . --include="*.py" --include="*.md" --include="*.yaml" --include="*.json" --exclude-dir=.venv --exclude-dir=.git --exclude=.env.example 2>/dev/null
