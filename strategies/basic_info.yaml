# 官方基本信息分析策略
# 对应框架维度一

name: basic_info
display_name: 官方基本信息
description: 公司概况、股权结构、管理层、公司治理、IR 材料指引
category: basic_info
dimensions: [1]
data_modules:
  - a_share_data.get_stock_info
  - a_share_data.get_shareholders
  - a_share_data.get_governance_signals
instructions: |
  根据以下数据进行分析（{data}）：

  1. **公司概况**：公司全称、上市时间、注册地、主营业务描述
     - 每个字段标注 [来源: {接口名} / {日期}]

  2. **股权结构**：
     - 控股股东及实际控制人结构
     - 十大股东持股比例，判断股权集中度
     - 质押比例排查：> 50% 标注 ⚠️ 高风险

  3. **治理风险信号**：
     - 质押比例：> 30% 标注关注，> 50% 标注高风险
     - 限售解禁：未来 12 个月解禁规模及占比
     - 商誉/净资产：> 30% 标注减值风险

  4. **投资者关系**：
     - 公司官网 IR 页面链接
     - 近一年重大事项公告摘要（如有）
     - 提示用户查阅巨潮资讯/上交所/深交所公告

  5. 每个数字标注 [来源: {接口名} / {日期}]
verification_checklist: |
  - [ ] 在东方财富/同花顺交叉核对控股股东持股比例
  - [ ] 检查巨潮资讯最近一年的重大事项公告
  - [ ] 核对质押比例与公司公告是否一致
