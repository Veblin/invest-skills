# 财务健康度分析策略
# 对应框架维度二（核心优先级：★★★★★）

name: fundamental
display_name: 财务健康度分析
description: 基于 ROE/ROIC/FCF 的质量分析，覆盖盈利能力、成长性、现金流质量、风险信号
category: fundamental
dimensions: [2]
data_modules:
  - a_share_data.get_financials
  - a_share_data.get_governance_signals
instructions: |
  根据以下财务数据进行分析（{data}）：

  1. **盈利能力**（近 3 年 + 最近季报）：
     - 检查 ROE 是否连续 3 年 > 15%
     - 杜邦分解：ROE = 净利率 × 周转率 × 杠杆 → 判断高质量还是高杠杆驱动
     - ROIC 是否 > WACC（估估值 ~8-10%）
     - 毛利率趋势（持续下滑需警惕竞争加剧）

  2. **成长性**：
     - 营收 YoY 增速、净利润 YoY 增速
     - 分业务板块收入占比变化（业务结构变化往往预示战略转向）

  3. **现金流质量**：
     - 经营 CF / 净利润 比率 → > 100% 为健康
     - FCF / 净利润 比率 → > 80% 为优质
     - 若净利润为正但经营 CF 持续为负 → 标注 ⚠️ 高度警惕

  4. **风险信号排查**：
     - 资产负债率
     - 应收账款/营收比例
     - 存货周转趋势
     - 商誉/净资产比例
     - 关联交易占比

  5. 每个数字标注 [来源: {接口名} / {日期}]
verification_checklist: |
  - [ ] 在东方财富/同花顺交叉核对 ROE 和毛利率数字
  - [ ] 阅读最新年报"经营讨论与分析"章节，验证趋势判断
  - [ ] 对比同行业 3 家公司的同指标
  - [ ] 检查 2026Q1 季报，确认趋势是否持续
