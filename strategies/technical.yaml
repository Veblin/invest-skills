# 市场状态（技术分析）策略
# 对应框架维度四(b)

name: technical
display_name: 市场状态（技术分析）
description: MA 均线位置、MACD 描述。仅描述市场状态，禁止生成交易信号。
category: technical
dimensions: [4.5]
data_modules:
  - a_share_data.get_daily_kline
  - hk_share_data.get_hk_daily_kline
instructions: |
  根据以下 K 线数据描述市场状态（{data}）：

  **允许的描述方式**：
  - ✅ 当前价格与 MA5/MA10/MA20/MA60 的位置关系（如"价格位于 MA60 上方，MA20 走平"）
  - ✅ 均线排列关系（多头排列/空头排列/缠绕）
  - ✅ MACD 的 DIF/DEA 位置和方向（如"DIF 在零轴上方""DIF 向下靠近 DEA"）
  - ✅ "近期价格在 XX-XX 区间波动，MA60 提供支撑/压力"
  - ✅ 结合均线和 MACD 描述"市场参与者目前的共识趋势"

  **严格禁止的输出**（违反 LAW 6）：
  - ❌ "金叉买入""死叉卖出""MACD 底背离抄底""放量突破追涨"
  - ❌ 任何基于技术指标的操作建议
  - ❌ "支撑位买入""压力位卖出"
  - ❌ "建议""考虑""可以"等带有建议意味的词语修饰技术信号

  1. 描述均线状态
  2. 描述 MACD 位置关系
  3. 综合描述当前市场共识趋势方向
  4. 标注：⚠️ 技术指标仅反映市场参与者的交易行为和共识，不构成交易建议

verification_checklist: |
  - [ ] 全文搜索无"金叉""死叉""买入""卖出""建议操作"
  - [ ] 所有技术描述均为状态描述，非操作建议
  - [ ] 末尾有技术指标使用规范的提示
