# ETF 分析策略（MVP 禁用，Phase 6 启用）

name: etf_analysis
display_name: ETF 专项分析
description: ETF 折溢价、跟踪误差、份额变动、AUM、持仓结构分析。MVP 阶段指向 etf_guide.md 知识库，Phase 6 启用完整分析。
category: etf
dimensions: [8]
enabled: false
data_modules:
  - etf_data.get_etf_stub
instructions: |
  **MVP 阶段**：ETF 代码触发时，仅运行 basic_info + etf_guide 知识库导读。

  **Phase 6 启用完整分析**：
  根据以下 ETF 数据进行分析（{data}）：

  1. **基本信息**：发行商、跟踪指数、费率、AUM
  2. **折溢价率**：当前折溢价及近 1 年分位
  3. **跟踪误差**：近 1 年年化跟踪误差
  4. **持仓结构**：Top10 持仓占比及行业分布
  5. **份额变动**：近 6 个月份额变动趋势
  6. **流动性**：日均成交额、买卖价差
  7. 每个数字标注 [来源: {接口名} / {日期}]
  8. 不做：ETF 买卖建议

verification_checklist: |
  - [ ] 折溢价数据标注数据来源和时间
  - [ ] 跟踪误差标注计算方法和基准指数
  - [ ] 无买卖建议
