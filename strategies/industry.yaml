# 行业产业链分析策略
# 对应框架维度三

name: industry
display_name: 行业产业链分析
description: 行业赛道、市场规模、竞争格局（CR5）、产业链上下游、议价能力
category: industry
dimensions: [3]
data_modules:
  - industry_chain.get_industry_context
  - industry_chain.search_supply_chain
instructions: |
  根据以下行业数据进行分析（{data}）：

  1. **行业定位**：
     - 申万行业分类
     - 赛道特征（成长/成熟/周期/衰退）
     - 市场规模及增速（如数据可得）

  2. **竞争格局**：
     - 同业列表及简要对比
     - CR5 集中度（如数据可得）
     - 公司在行业中的地位（龙头/跟随者/利基者）

  3. **产业链位置**：
     - 上游：原材料/供应商
     - 中游：公司所在环节
     - 下游：客户/终端市场
     - 议价能力分析（对上/对下游谁更强）

  4. **行业政策环境**：
     - 近期行业政策（利好/规范/压制）
     - 政策变化趋势

  5. 每个判断标注依据 [依据: {数据来源}]
verification_checklist: |
  - [ ] 查阅最新行业研报，核对竞争格局描述
  - [ ] 在东方财富行业板块中核对同业列表
  - [ ] 关注行业协会/政府部门最新政策文件
