# ============================================================
# 交叉验证规则配置
# ============================================================
# 版本: v0 (初始默认值)
# 用途: quality_scorer.py 在 v0.3 阶段启用交叉验证加分和分歧告警
#
# 设计约定:
# - 规则按 metric 类型分组，后续可按 PE、价格、金额等拆分
# - v0 使用全局阈值，v1.0 按 metric 类型细化
# - 阈值从采集遥测中校准，不作为架构约束
# ============================================================

# 全局默认规则（v0 适用所有 metric 类型）
global:
  cross_validation:
    # 一致性加分阈值
    agreement:
      threshold_pct: 5.0           # 两源偏差 < 5% 视为一致
      bonus_stars:
        two_sources: 0.5           # 2个独立源一致 → +0.5★
        three_plus_sources: 1.0    # 3个及以上一致 → +1★
      max_stars: 5                 # 置信度上限 5★

    # 分歧告警阈值
    divergence:
      threshold_pct: 10.0          # 两源偏差 > 10% 触发告警
      penalty_stars: -1.0          # 降 1★
      action: warn_and_use_median  # 标注⚠️ + 取中值
      warning_template: "⚠️ {metric_name} 在不同数据源间存在 >{threshold}% 偏差（{source1}: {value1}, {source2}: {value2}），取中值，请独立验证。"

    # 单源标注
    single_source:
      label: "[单一来源]"
      no_penalty: true             # 不扣分，但明示风险

  # 时效性降权规则
  timeliness:
    windows:
      financial_report:
        fresh_days: 90             # 财报发布后90天内
        stale_penalty_stars: -0.5  # 过期降 0.5★
        stale_warning: "最新财报为{quarter}，请注意时效"

      news_sentiment:
        fresh_days: 7
        warn_days: 30              # 7-30天仅标注日期
        stale_days: 90             # >30天降权
        stale_penalty_stars: -1.0

      macro_data:
        fresh_days: 30
        warn_days: 90
        stale_penalty_stars: -0.5
        note: "宏观数据更新频率固定，仅降权不标注过期"

      analyst_consensus:
        fresh_days: 90
        warn_days: 180
        stale_penalty_stars: -1.0

      northbound_flow:
        fresh_days: 1
        warn_days: 3
        stale_warning: "数据延迟{days}日"

      institutional_research:
        fresh_days: 30
        warn_days: 90
        stale_penalty_stars: -1.0

      realtime_quote:
        intraday: true             # 盘中实时
        after_close: "收盘价"      # 收盘后标注
        next_day: "数据延迟"       # 次日开盘后标注

# 按 metric 类型细化（v1.0 启用）
metric_specific:
  pe_ratio:
    agreement_threshold_pct: 10.0  # PE 计算口径差异大，放宽
    divergence_threshold_pct: 20.0
  pb_ratio:
    agreement_threshold_pct: 8.0
    divergence_threshold_pct: 15.0
  price:
    agreement_threshold_pct: 1.0   # 价格应精确一致
    divergence_threshold_pct: 3.0
  volume:
    agreement_threshold_pct: 10.0
    divergence_threshold_pct: 25.0
  revenue:
    agreement_threshold_pct: 5.0
    divergence_threshold_pct: 10.0
  net_profit:
    agreement_threshold_pct: 5.0
    divergence_threshold_pct: 10.0
